<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyScooter Log - Mapa Inteligente (Vanilla)</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/main.css" />
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8 pb-20">
    <div id="duplicate-modal" class="hidden fixed inset-0 z-[150] bg-black/60 flex items-center justify-center p-4"></div>
    <div id="map-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4"></div>
    <div id="settings-modal" class="hidden fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-6"></div>

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="flex items-center justify-between bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h1 id="main-title" class="text-2xl font-bold flex items-center gap-2 text-emerald-600">
                <i data-feather="zap" class="text-emerald-600 fill-emerald-600"></i> MyScooter Log
            </h1>
            <button id="btn-settings" class="p-2 text-slate-400 bg-white rounded-full shadow-sm border hover:bg-slate-50 transition-colors"><i data-feather="settings"></i></button>
        </div>

        <!-- ABAS DE NAVEGAÇÃO -->
        <div class="flex gap-4">
            <button id="tab-official" class="flex-1 py-3 rounded-2xl font-bold flex justify-center items-center gap-2 transition-all bg-emerald-600 text-white shadow-lg scale-100">
                <i data-feather="zap" class="text-white fill-white"></i> Oficial
            </button>
            <button id="tab-simulation" class="flex-1 py-3 rounded-2xl font-bold flex justify-center items-center gap-2 transition-all bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 scale-95">
                <i data-feather="monitor"></i> Simulação
            </button>
        </div>

        <!-- CARDS DE TOTAIS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                <div class="text-xs text-slate-400 font-bold uppercase">Custo</div>
                <div id="total-cost" class="text-xl font-bold text-emerald-600">R$ 0,00</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                <div class="text-xs text-slate-400 font-bold uppercase">KM</div>
                <div id="total-km" class="text-xl font-bold text-blue-600">0.0 km</div>
            </div>
            <div id="battery-card" class="bg-white p-4 rounded-xl shadow-sm border text-center transition-colors duration-300">
                <div id="battery-label" class="text-xs text-slate-400 font-bold uppercase">Bateria</div>
                <div id="total-battery" class="text-xl font-bold text-slate-700">0%</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                <div class="text-xs text-slate-400 font-bold uppercase">Carga</div>
                <div id="total-charge" class="text-xl font-bold text-amber-600">00:00</div>
            </div>
        </div>

        <!-- FORMULÁRIO -->
        <div id="form-container" class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-emerald-500">
            <form id="trip-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>
                    <input type="date" id="input-date" required class="w-full bg-slate-50 border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" />
                </div>
                
                <div class="md:col-span-2 relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Trajeto</label>
                    <input type="text" id="input-route" placeholder="Digite ou selecione..." autocomplete="off" class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" />
                    <ul id="route-suggestions" class="hidden absolute z-50 w-full bg-white border rounded-lg shadow-xl max-h-60 overflow-y-auto mt-1 custom-scroll"></ul>
                </div>

                <div class="relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Distância (KM)</label>
                    <div class="flex gap-2">
                        <input type="number" step="0.1" id="input-distance" required class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" />
                        <button type="button" id="btn-open-map" class="p-2.5 rounded-lg transition-colors bg-emerald-100 text-emerald-600 hover:bg-emerald-200">
                            <i data-feather="map"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="btn-submit" class="md:col-span-4 text-white font-bold py-3 rounded-lg transition-colors bg-emerald-600 hover:bg-emerald-700">
                    Registrar Viagem
                </button>
            </form>
        </div>

        <!-- LISTA DE VIAGENS -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 id="list-title" class="text-lg font-bold text-slate-700 flex items-center gap-2">
                    <i data-feather="calendar"></i> Histórico de Viagens
                </h2>
                <div id="sim-actions" class="hidden flex gap-2">
                    <button id="btn-copy-official" class="text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center gap-1 bg-blue-50 px-3 py-1.5 rounded-lg transition-colors">
                        <i data-feather="copy" width="14" height="14"></i> Copiar Oficial
                    </button>
                    <button id="btn-clear-sim" class="text-xs text-red-500 hover:text-red-700 font-bold flex items-center gap-1 bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                        <i data-feather="trash-2" width="14" height="14"></i> Limpar
                    </button>
                </div>
            </div>
            
            <div id="trips-container" class="grid gap-2">
                <!-- Trip items injected via JS -->
            </div>
        </div>
    </div>
    <script type="module" src="/src/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyScooter Log - Mapa Inteligente (Vanilla)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/main.css" />
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8 pb-20">
    <div id="duplicate-modal" class="hidden fixed inset-0 z-[150] bg-black/60 flex items-center justify-center p-4"></div>
    <div id="map-modal" class="hidden fixed inset-0 z-[150] bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-4xl h-[90vh] flex flex-col overflow-hidden relative shadow-2xl">
            <button id="btn-close-map" class="absolute top-4 right-4 z-[400] bg-white p-2 text-slate-500 rounded-full shadow border hover:text-red-500 hover:bg-slate-50 transition-colors">
                <i data-lucide="x"></i>
            </button>
            
            <div class="p-4 bg-white border-b z-10 shadow-sm flex flex-col md:flex-row gap-4">
                <div class="flex-1 space-y-2">
                    <div class="uppercase text-xs font-bold text-slate-400">Ponto A (Origem)</div>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text" id="map-input-a" class="w-full border rounded-lg p-2 pl-8 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Pesquisar..." autocomplete="off">
                            <i data-lucide="map-pin" class="absolute left-2.5 top-2.5 text-slate-400" width="16"></i>
                            <ul id="sugg-map-a" class="hidden absolute w-full bg-white border z-[1000] rounded-b-lg shadow-lg max-h-40 overflow-y-auto"></ul>
                        </div>
                        <button id="btn-pick-a" class="px-3 border rounded-lg text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 hover:border-emerald-200 transition-all" title="Selecionar no mapa">
                            <i data-lucide="crosshair" width="16"></i>
                        </button>
                    </div>
                </div>
                <div class="flex-1 space-y-2">
                    <div class="uppercase text-xs font-bold text-slate-400">Ponto B (Destino)</div>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text" id="map-input-b" class="w-full border rounded-lg p-2 pl-8 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Pesquisar..." autocomplete="off">
                            <i data-lucide="map-pin" class="absolute left-2.5 top-2.5 text-slate-400" width="16"></i>
                            <ul id="sugg-map-b" class="hidden absolute w-full bg-white border z-[1000] rounded-b-lg shadow-lg max-h-40 overflow-y-auto"></ul>
                        </div>
                        <button id="btn-pick-b" class="px-3 border rounded-lg text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 hover:border-emerald-200 transition-all" title="Selecionar no mapa">
                            <i data-lucide="crosshair" width="16"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="map-view" class="flex-1 w-full relative z-0"></div>

            <div class="p-4 bg-white border-t flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-4 text-sm font-bold text-slate-600">
                    <div>Distância: <span id="map-dist-preview" class="text-blue-600">0.0</span> km</div>
                </div>
                <button id="btn-use-route" class="w-full md:w-auto px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-colors shadow flex items-center justify-center gap-2 opacity-50 cursor-not-allowed pointer-events-none">
                    <i data-lucide="check" width="18"></i> Usar esta rota
                </button>
            </div>
        </div>
    </div>
    <div id="settings-modal" class="hidden fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm relative">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
                <i data-lucide="settings"></i> Configurações
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">GitHub Token (PAT)</label>
                    <input type="password" id="input-gh-token" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="ghp_..." />
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Gist ID</label>
                    <input type="text" id="input-gh-gist" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="ex: a1b2c3d4..." />
                </div>
                <div class="pt-4 flex gap-2">
                    <button type="button" id="btn-close-settings" class="flex-1 py-2 rounded-lg font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
                    <button type="button" id="btn-save-settings" class="flex-1 py-2 rounded-lg font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-colors">Salvar</button>
                </div>
                <div class="pt-2">
                    <button type="button" id="btn-force-sync" class="w-full py-2 rounded-lg font-bold text-blue-600 bg-blue-50 border border-blue-200 hover:bg-blue-100 transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw" width="16"></i> Forçar Sincronização
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="flex items-center justify-between gap-4 bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100">
            <h1 id="main-title" class="text-xl md:text-2xl font-bold flex items-center gap-2 text-emerald-600 truncate min-w-0">
                <i data-lucide="zap" class="text-emerald-600 fill-emerald-600 shrink-0"></i> 
                <span class="truncate">MyScooter Log</span>
            </h1>
            <button id="btn-settings" class="shrink-0 p-2 text-slate-600 bg-white rounded-full shadow-sm border hover:bg-emerald-50 hover:text-emerald-600 transition-colors"><i data-lucide="settings"></i></button>
        </div>

        <!-- ABAS DE NAVEGAÇÃO -->
        <div class="flex gap-4">
            <button id="tab-official" class="flex-1 py-3 rounded-2xl font-bold flex justify-center items-center gap-2 transition-all bg-emerald-600 text-white shadow-lg scale-100">
                <i data-lucide="zap" class="text-white fill-white"></i> Oficial
            </button>
            <button id="tab-simulation" class="flex-1 py-3 rounded-2xl font-bold flex justify-center items-center gap-2 transition-all bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 scale-95">
                <i data-lucide="monitor"></i> Simulação
            </button>
        </div>

        <!-- CARDS DE TOTAIS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                <div class="text-xs text-slate-400 font-bold uppercase">Custo</div>
                <div id="total-cost" class="text-xl font-bold text-emerald-600">R$ 0,00</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                <div class="text-xs text-slate-400 font-bold uppercase">KM</div>
                <div id="total-km" class="text-xl font-bold text-blue-600">0.0 km</div>
            </div>
            <div id="battery-card" class="bg-white p-4 rounded-xl shadow-sm border text-center transition-colors duration-300">
                <div id="battery-label" class="text-xs text-slate-400 font-bold uppercase">Bateria</div>
                <div id="total-battery" class="text-xl font-bold text-slate-700">0%</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                <div class="text-xs text-slate-400 font-bold uppercase">Carga</div>
                <div id="total-charge" class="text-xl font-bold text-amber-600">00:00</div>
            </div>
        </div>

        <!-- FORMULÁRIO -->
        <div id="form-container" class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-emerald-500">
            <form id="trip-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>
                    <input type="date" id="input-date" required class="w-full bg-slate-50 border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" />
                </div>
                
                <div class="md:col-span-2 relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Trajeto</label>
                    <input type="text" id="input-route" placeholder="Digite ou selecione..." autocomplete="off" class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" />
                    <ul id="route-suggestions" class="hidden absolute z-50 w-full bg-white border rounded-lg shadow-xl max-h-60 overflow-y-auto mt-1 custom-scroll"></ul>
                </div>

                <div class="relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Distância (KM)</label>
                    <div class="flex gap-2">
                        <input type="number" step="0.1" id="input-distance" required class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500" />
                        <button type="button" id="btn-open-map" class="p-2.5 rounded-lg transition-colors bg-emerald-100 text-emerald-600 hover:bg-emerald-200">
                            <i data-lucide="map"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="btn-submit" class="md:col-span-4 text-white font-bold py-3 rounded-lg transition-colors bg-emerald-600 hover:bg-emerald-700">
                    Registrar Viagem
                </button>
            </form>
        </div>

        <!-- LISTA DE VIAGENS -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 id="list-title" class="text-lg font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="calendar"></i> Histórico de Viagens
                </h2>
                <div id="sim-actions" class="hidden flex gap-2">
                    <button id="btn-copy-official" class="text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center gap-1 bg-blue-50 px-3 py-1.5 rounded-lg transition-colors">
                        <i data-lucide="copy" width="14" height="14"></i> Copiar Oficial
                    </button>
                    <button id="btn-clear-sim" class="text-xs text-red-500 hover:text-red-700 font-bold flex items-center gap-1 bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                        <i data-lucide="trash-2" width="14" height="14"></i> Limpar
                    </button>
                </div>
            </div>
            
            <div id="trips-container" class="grid gap-2">
                <!-- Trip items injected via JS -->
            </div>
        </div>
    </div>
    <script type="module" src="/src/app.js"></script>
</body>
</html>
